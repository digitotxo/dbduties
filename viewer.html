<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Duty Viewer</title>

<style>

body{
    margin:0;
    padding:15px;
    background:#f2f5fa;
    font-family:Arial,sans-serif;
}

.container{
    max-width:900px;
    margin:auto;
}

.card{
    background:white;
    border-radius:20px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 4px 20px rgba(0,0,0,.10);
}

h1{
    color:#0c4da2;
    margin-top:0;
}

iframe{
    width:100%;
    height:1400px;
    border:none;
    border-radius:12px;
    background:white;
}

.support-card{
    background:white;
    border-radius:20px;
    padding:22px;
    margin-bottom:24px;
    text-align:center;
    box-shadow:0 4px 20px rgba(0,0,0,.10);
}

.coffee-button{
    display:inline-block;
    padding:16px 24px;
    background:#ffd43b;
    color:#000;
    text-decoration:none;
    font-weight:bold;
    border-radius:12px;
    font-size:18px;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1 id="welcome">
👋 Hello Driver
</h1>

<p id="dateText">
Your duty is ready.
</p>

</div>

<div class="card">

<iframe id="dutyFrame"></iframe>

</div>

<div class="support-card">

<h3>☕ Enjoying DB Duty Checker?</h3>

<p>
This project is provided free of charge.
If it saves you time every week, a coffee is always appreciated.
</p>

<a
class="coffee-button"
href="https://revolut.me/lander9vxj"
target="_blank">

☕ Buy Me a Coffee

</a>

</div>

</div>

<script>

const params =
new URLSearchParams(window.location.search);

const name =
params.get("name") || "Driver";

const date =
params.get("date") || "";

const roster =
params.get("roster");

const duty =
params.get("duty");

const type =
params.get("type");

document.getElementById("welcome").innerHTML =
"👋 Hello " + name;

if(date){
document.getElementById("dateText").innerHTML =
"Your duty for " + date + " is ready.";
}

const dutyUrl =
"DONNYBROOK/" +
roster + "_" + type +
"/" +
roster + "-" + duty +
".html";

document.getElementById("dutyFrame").src =
dutyUrl;

window.scrollTo(0,0);

</script>

</body>
</html>
