<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dublin Bus Duties</title><style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f5f5f5;
    font-family:Arial, sans-serif;
}

button{
    font-size:28px;
    font-weight:bold;
    padding:25px 50px;
    border:none;
    border-radius:12px;
    background:#0078d7;
    color:white;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

#status{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    color:#555;
    font-size:14px;
}
</style></head>
<body><button onclick="openDuty()">OPEN DUTY</button>

<div id="status"></div><script>

const BASE_URL =
"https://digitotxo.github.io/dbduties/DONNYBROOK/";

const bankHolidays = [

    // 2026
    "2026-01-01",
    "2026-02-02",
    "2026-03-17",
    "2026-04-06",
    "2026-05-04",
    "2026-06-01",
    "2026-08-03",
    "2026-10-26",
    "2026-12-25",
    "2026-12-28"

];

async function openDuty() {

    try {

        const text = await navigator.clipboard.readText();

        const rosterMatch =
            text.match(/Roster\s*:\s*([A-Z0-9]+)\s*\/\s*(\d+)/i);

        const dateMatch =
            text.match(/Date\s*:\s*(\d{1,2})\/(\d{1,2})\/(\d{4})/i);

        if (!rosterMatch) {
            alert("Roster not found in clipboard.");
            return;
        }

        if (!dateMatch) {
            alert("Date not found in clipboard.");
            return;
        }

        const roster = rosterMatch[1].toUpperCase();
        const duty = rosterMatch[2].padStart(2, "0");

        const day = parseInt(dateMatch[1], 10);
        const month = parseInt(dateMatch[2], 10);
        const year = parseInt(dateMatch[3], 10);

        const date = new Date(year, month - 1, day);

        const isoDate =
            year + "-" +
            String(month).padStart(2, "0") + "-" +
            String(day).padStart(2, "0");

        let dutyType;

        if (bankHolidays.includes(isoDate)) {
            dutyType = "SUN";
        }
        else if (date.getDay() === 0) {
            dutyType = "SUN";
        }
        else if (date.getDay() === 6) {
            dutyType = "SAT";
        }
        else {
            dutyType = "MF";
        }

        const folder = roster + "_" + dutyType;
        const filename = roster + "-" + duty + ".html";

        const url =
            BASE_URL +
            folder +
            "/" +
            filename;

        document.getElementById("status").textContent =
            "Opening " + filename;

        window.location.href = url;

    }
    catch (err) {
        console.error(err);
        alert(
            "Unable to read clipboard. " +
            "Make sure the SMS has been copied first."
        );
    }
}

</script></body>
</html>
