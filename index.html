<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DB Duty Checker</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:20px;
    font-family:Arial,sans-serif;
    background:#f2f5fa;
    color:#222;
}

.container{
    max-width:600px;
    margin:auto;
}

.logo-button{
    width:100%;
    background:none;
    border:none;
    padding:0;
    cursor:pointer;
}

.logo-button img{
    width:100%;
    max-width:420px;
    display:block;
    margin:10px auto 20px auto;
}

.card{
    background:white;
    border-radius:20px;
    padding:24px;
    box-shadow:0 4px 20px rgba(0,0,0,.1);
}

h2{
    text-align:center;
    margin-top:0;
}

label{
    display:block;
    margin-top:12px;
    margin-bottom:6px;
    font-weight:bold;
}

input,
select{
    width:100%;
    padding:14px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:16px;
}

.manual-button{
    width:100%;
    margin-top:20px;
    padding:16px;
    font-size:18px;
    font-weight:bold;
    border:none;
    border-radius:12px;
    background:#0c4da2;
    color:white;
    cursor:pointer;
}

.manual-button:hover{
    opacity:.9;
}
</style>

</head>

<body>

<div class="container">

<button class="logo-button" onclick="openCopiedDuty()">
<img src="file_00000000d82c71f4996b264dea697185.png" alt="DB Duty Checker">
</button>

<div class="card">

<h2>Manual Duty Lookup</h2>

<label>Roster</label>
<select id="roster">
    <option>DZ1</option>
    <option>DZ2</option>
    <option>DZ3</option>
    <option>13</option>
</select>

<label>Duty Number</label>
<input
id="dutyNumber"
type="number"
placeholder="Example: 17">

<label>Day Type</label>
<select id="dayType">
    <option value="MF">Monday - Friday</option>
    <option value="SAT">Saturday</option>
    <option value="SUN">Sunday / Bank Holiday</option>
</select>

<button
class="manual-button"
onclick="openManualDuty()">
OPEN DUTY
</button>

</div>

</div>

<script>

const BASE = "DONNYBROOK/";

const bankHolidays = [
"2026-01-01",
"2026-02-02",
"2026-03-17",
"2026-04-06",
"2026-05-04",
"2026-06-01",
"2026-08-03",
"2026-10-26",
"2026-12-25",
"2026-12-28"
];

async function openCopiedDuty(){

try{

const text = await navigator.clipboard.readText();

const rosterMatch =
text.match(/Roster\s*:\s*([A-Z0-9]+)\s*\/\s*(\d+)/i);

const dateMatch =
text.match(/Date\s*:\s*(\d{1,2})\/(\d{1,2})\/(\d{4})/i);

if(!rosterMatch){
alert("Roster not found.");
return;
}

if(!dateMatch){
alert("Date not found.");
return;
}

const roster =
rosterMatch[1].toUpperCase();

const duty =
rosterMatch[2].padStart(2,"0");

const day =
parseInt(dateMatch[1]);

const month =
parseInt(dateMatch[2]);

const year =
parseInt(dateMatch[3]);

const date =
new Date(year,month-1,day);

const isoDate =
year + "-" +
String(month).padStart(2,"0") + "-" +
String(day).padStart(2,"0");

let type = "MF";

if(bankHolidays.includes(isoDate)){
type = "SUN";
}
else if(date.getDay() === 0){
type = "SUN";
}
else if(date.getDay() === 6){
type = "SAT";
}

window.location.href =
BASE +
roster + "_" + type +
"/" +
roster + "-" + duty +
".html";

}
catch(err){

alert(
"Copy the SMS first, then tap the logo."
);

}

}

function openManualDuty(){

const roster =
document.getElementById("roster").value;

const duty =
document.getElementById("dutyNumber").value
.padStart(2,"0");

const type =
document.getElementById("dayType").value;

if(!duty){
alert("Enter a duty number.");
return;
}

window.location.href =
BASE +
roster + "_" + type +
"/" +
roster + "-" + duty +
".html";

}

</script>

</body>
</html>
